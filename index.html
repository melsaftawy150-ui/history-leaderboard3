<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة شرف التاريخ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>🏆 لوحة شرف التاريخ 🏆</h1>
        <p>مستر محمد عبد الفتاح</p>
    </div>

    <div class="container">
        <!-- منصة التتويج الأصلية الأفقية بناءً على الـ CSS الأصلي بتاعك -->
        <div class="podium">
            <!-- المركز الثاني -->
            <div class="podium-card second">
                <h3>🥈 الثاني</h3>
                <div id="secondName" class="name">...</div>
                <div id="secondScore" class="score">...</div>
            </div>
            <!-- المركز الأول -->
            <div class="podium-card first">
                <h3>🥇 الأول</h3>
                <div id="firstName" class="name">...</div>
                <div id="firstScore" class="score">...</div>
            </div>
            <!-- المركز الثالث -->
            <div class="podium-card third">
                <h3>🥉 الثالث</h3>
                <div id="thirdName" class="name">...</div>
                <div id="thirdScore" class="score">...</div>
            </div>
        </div>

        <!-- خانة البحث -->
        <div class="search-box">
            <input type="text" id="search" placeholder="🔍 ابحث باسم الطالب...">
        </div>

        <!-- جدول الترتيب المظبوط بالعناوين الصحيحة -->
        <table>
            <thead>
                <tr>
                    <th>الترتيب</th>
                    <th>الاسم</th>
                    <th>الدرجة</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- البيانات هتنزل هنا تلقائياً -->
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
